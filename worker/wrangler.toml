name = "upcells-licence-webhook"
main = "index.js"
compatibility_date = "2024-01-01"

# Non-secret config. Comma-separated Polar product ID(s) that grant the Sales Accelerator
# tier — matching orders get metadata.salesAccelerator=true on the Keygen licence. Leave
# empty for standard-only. (Secrets — KEYGEN_*, POLAR_WEBHOOK_SECRET, RESEND_API_KEY — are
# set with `wrangler secret put`, not here.)
[vars]
POLAR_SALES_ACCELERATOR_PRODUCT_IDS = ""
